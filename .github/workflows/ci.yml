name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///test.db
          TEST_USE_CREATE_ALL: "1"
        run: |
          pytest -x -q --tb=short \
            --ignore=tests/test_migration_integrity.py \
            --ignore=tests/test_db_constraints.py \
            --ignore=tests/test_model_json_safety.py \
            --ignore=tests/test_postgres_compat.py \
            --ignore=tests/test_flask_reliability.py \
            -k "not (TestFetchStartMark)"

  postgres-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: missoula_pro_am_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d missoula_pro_am_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Apply migrations on PostgreSQL
        env:
          FLASK_APP: app.py
          FLASK_ENV: testing
          SECRET_KEY: ci-postgres-secret-key
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/missoula_pro_am_test
        run: flask db upgrade

      - name: Run PostgreSQL smoke tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-postgres-secret-key
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/missoula_pro_am_test
        run: pytest tests/test_postgres_runtime_smoke.py -q

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Check for syntax errors
        run: python -m py_compile app.py

      - name: Ruff lint
        run: ruff check .

  pip-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install requirements + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit on installed deps (excluding strathmark)
        # We can't use `pip-audit -r requirements.txt` because requirements.txt
        # pins strathmark via a git URL that pip-audit cannot look up against
        # PyPI's vulnerability database (it errors out in --strict mode).
        # Workaround: take `pip freeze` of the resolved environment, drop the
        # strathmark line (which is published privately), and audit the rest.
        # Strathmark itself is pinned to a specific commit SHA in
        # requirements.txt — that's the supply-chain control for it.
        run: |
          pip freeze | grep -v -i '^strathmark' > /tmp/installed-without-strathmark.txt
          pip-audit -r /tmp/installed-without-strathmark.txt --strict

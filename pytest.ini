[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers — run subsets with: pytest -m smoke
markers =
    smoke: Quick sanity checks (< 1s each, no DB writes)
    integration: Multi-step tests that exercise real service code with DB
    slow: Tests that take > 2s (template rendering, full workflows)

# Default: show short summary, 1-line per failure, warnings
addopts = --tb=short -q

# Ignore deprecation warnings from dependencies we don't control
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy
    ignore::DeprecationWarning:supabase
    ignore::DeprecationWarning:flask_sqlalchemy

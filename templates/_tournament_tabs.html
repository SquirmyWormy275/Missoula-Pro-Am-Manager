{# templates/_tournament_tabs.html
   Shared 3-tab navigation for the tournament hub.
   Requires context vars: tournament (model), active_tab ('overview'|'college'|'pro')
   Add no-print class so tabs are hidden from printouts. #}
<style>
  .sx-tournament-tabs { border-bottom: 2px solid var(--sx-border-bright); gap: 0; }
  .sx-tournament-tabs .nav-link {
    color: var(--sx-text-2);
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    border-radius: 0;
    padding: 0.6rem 1.25rem;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.02em;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    margin-bottom: -2px;
  }
  .sx-tournament-tabs .nav-link:hover {
    color: var(--sx-text);
    border-bottom-color: var(--sx-border-bright);
    background: rgba(255, 255, 255, 0.04);
  }
  .sx-tournament-tabs .nav-link.active {
    color: var(--sx-gold);
    border-bottom-color: var(--sx-gold);
    background: transparent;
  }
  .sx-tournament-tabs .nav-link i { opacity: 0.85; }
</style>
<ul class="nav sx-tournament-tabs mb-4 no-print">
  <li class="nav-item">
    <a class="nav-link {{ 'active' if active_tab == 'overview' else '' }}"
       href="{{ url_for('main.tournament_detail', tournament_id=tournament.id) }}">
      <i class="bi bi-grid-3x3-gap me-1"></i> Overview
    </a>
  </li>
  <li class="nav-item">
    <a class="nav-link {{ 'active' if active_tab == 'college' else '' }}"
       href="{{ url_for('main.college_dashboard', tournament_id=tournament.id) }}">
      <i class="bi bi-mortarboard me-1"></i> College Day
    </a>
  </li>
  <li class="nav-item">
    <a class="nav-link {{ 'active' if active_tab == 'pro' else '' }}"
       href="{{ url_for('main.pro_dashboard', tournament_id=tournament.id) }}">
      <i class="bi bi-trophy me-1"></i> Pro Day
    </a>
  </li>
</ul>
